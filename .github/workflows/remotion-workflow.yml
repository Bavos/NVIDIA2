name: Render Remotion Video

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Render Remotion video
        run: npx remotion render src/index.ts video-ai-tech out/video-ai-tech-sem-som.mp4

      - name: Upload rendered video
        uses: actions/upload-artifact@v4
        with:
          name: video-ai-tech-sem-som
          path: out/video-ai-tech-sem-som.mp4
